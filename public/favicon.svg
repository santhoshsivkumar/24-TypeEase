<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded rect -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <!-- Keyboard body -->
  <rect x="4" y="10" width="24" height="14" rx="2.5" fill="#f5a623"/>
  <!-- Key rows -->
  <!-- Row 1: 4 keys -->
  <rect x="6.5" y="12.5" width="4" height="3" rx="1" fill="#1a1a2e"/>
  <rect x="12" y="12.5" width="4" height="3" rx="1" fill="#1a1a2e"/>
  <rect x="17.5" y="12.5" width="4" height="3" rx="1" fill="#1a1a2e"/>
  <rect x="22.5" y="12.5" width="3" height="3" rx="1" fill="#1a1a2e"/>
  <!-- Row 2: space bar -->
  <rect x="6.5" y="17.5" width="4" height="3" rx="1" fill="#1a1a2e"/>
  <rect x="12" y="17.5" width="8.5" height="3" rx="1" fill="#1a1a2e"/>
  <rect x="22.5" y="17.5" width="3" height="3" rx="1" fill="#1a1a2e"/>
</svg>
